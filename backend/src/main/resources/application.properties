spring.application.name=confeitaria
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=${SPRING_HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.show-sql=true
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/init.sql
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false

# Server port (override with SERVER_PORT env var)
server.port=${SERVER_PORT}

# Controle de Capacidade Diária
confeitaria.limite-pedidos-diario=10

# ⚠️ IMPORTANT: Admin credentials should be externalized in production
# Use environment variables ADMIN_USERNAME and ADMIN_PASSWORD instead
admin.username=${ADMIN_USERNAME}
admin.password=${ADMIN_PASSWORD}

# ⚠️ JWT Settings - MUST be changed in production
# Use environment variable JWT_SECRET with a strong random value
# min length: 32 characters, recommended: 256-bit random value
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
