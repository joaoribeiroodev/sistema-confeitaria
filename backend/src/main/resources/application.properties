spring.application.name=confeitaria
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}


spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=${SPRING_HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.show-sql=true


spring.sql.init.mode=never
spring.jpa.open-in-view=false

# Server port (override with SERVER_PORT env var)
server.port=${SERVER_PORT}

# Controle de Capacidade Diária
confeitaria.limite-pedidos-diario=10

#  Admin credentials should be externalized in production
admin.username=${ADMIN_USERNAME}
admin.password=${ADMIN_PASSWORD}

# JWT Settings - MUST be changed in production
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Swagger / Springdoc OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs