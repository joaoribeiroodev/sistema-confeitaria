version: '3.8'

networks:
  confeitaria_net:
    driver: bridge

services:
  db:
    image: mysql:8.0
    container_name: confeitaria_db
    restart: unless-stopped
    # default-time-zone="-03:00" para forçar o MySQL no horário de Brasília
    command: --innodb-buffer-pool-size=128M --max-connections=50 --default-time-zone="-03:00"
    environment:
      MYSQL_DATABASE: confeitaria_db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: America/Sao_Paulo
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # 👇 LINHA ADICIONADA: Mapeia sua pasta local 'database' para inicializar o DB
      - ./database:/docker-entrypoint-initdb.d
    networks:
      - confeitaria_net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 350M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build: ./backend
    container_name: confeitaria-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - TZ=America/Sao_Paulo # Mantém o Java alinhado com o banco
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
      - SERVER_PORT=${SERVER_PORT}
      - JAVA_TOOL_OPTIONS=-Xmx256m -Xms128m 
    depends_on:
      db:
        condition: service_healthy
    networks:
      - confeitaria_net
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build: ./frontend
    container_name: confeitaria-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - confeitaria_net
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql_data: