name: CI/CD Pipeline Otimizado

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configurar Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: 'maven'

    - name: Build Backend (Spring Boot)
      run: |
        cd backend
        mvn clean package -DskipTests

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-size: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Build Frontend (Angular)
      run: |
        cd frontend
        npm install
        npm run build -- --configuration=production

    # Caso decida usar o plano gratuito da Render (Backend) e Vercel (Frontend),
    # basta adicionar os hooks de deploy via CLI ou Deploy Hooks HTTP abaixo.